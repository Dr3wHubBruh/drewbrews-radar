name: Weekly Trend Radar

on:
  # Wednesday 13:00 UTC = 5am PST / 6am PDT.
  # GitHub cron is UTC and does NOT observe DST, so this drifts ±1h seasonally —
  # harmless for weekly content. (Exact 5am year-round would need two cron lines.)
  schedule:
    - cron: "0 13 * * 3"
  # Manual "Run now" button in the Actions tab.
  workflow_dispatch:

# Allow the job to commit the refreshed radar.json back to the repo.
permissions:
  contents: write

# Never run two scouts at once.
concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run the scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scout.mjs

      - name: Commit radar.json if it changed
        run: |
          git config user.name  "drewbrews-radar-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- radar.json; then
            echo "radar.json unchanged — nothing to commit."
            exit 0
          fi
          git add radar.json
          git commit -m "radar: weekly refresh ($(date -u +%Y-%m-%d))"

          # Race-safe push: the remote may have advanced since checkout (a
          # concurrent run). Rebase our single commit on top of the latest main
          # and retry a few times. This is a fast-forward issue, not a
          # permissions one — keep using the built-in GITHUB_TOKEN.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (remote advanced?). Retrying in 5s…"
            sleep 5
          done
          echo "::error::Failed to push radar.json after 3 attempts."
          exit 1
